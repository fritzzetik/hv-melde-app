name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "ios-app/**"
      - "Sources/**"
      - "Package.swift"
      - "project.yml"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios-app/**"
      - "Sources/**"
      - "Package.swift"
      - "project.yml"
      - ".github/workflows/ios-build.yml"

permissions:
  contents: read

jobs:
  simulator-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: XcodeGen installieren
        run: brew install xcodegen
      - name: Xcode-Projekt erzeugen
        run: xcodegen generate
      - name: Simulator-Build
        run: |
          set -o pipefail
          if ! xcodebuild build \
              -project HVMeldeApp.xcodeproj \
              -scheme HVMeldeApp \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGNING_ALLOWED=NO \
              2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions; then
            grep -E "error:|BUILD FAILED" xcodebuild.log | head -40 \
              | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi
