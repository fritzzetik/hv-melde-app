name: TestFlight

on:
  workflow_dispatch:
  push:
    tags:
      - "testflight-*"

permissions:
  contents: read

jobs:
  testflight:
    runs-on: macos-26
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Secrets prüfen
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          fehlt=""
          [ -z "$API_KEY" ] && fehlt="$fehlt APP_STORE_CONNECT_API_KEY"
          [ -z "$KEY_ID" ] && fehlt="$fehlt APP_STORE_CONNECT_KEY_ID"
          [ -z "$ISSUER_ID" ] && fehlt="$fehlt APP_STORE_CONNECT_ISSUER_ID"
          [ -z "$TEAM_ID" ] && fehlt="$fehlt APPLE_TEAM_ID"
          [ -n "$fehlt" ] && { echo "::error::Fehlende Secrets:$fehlt"; exit 1; } || true

      - name: XcodeGen installieren
        run: brew install xcodegen

      - name: App-Store-Connect-Key ablegen
        env:
          API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$API_KEY" > ~/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${KEY_ID}.p8

      - name: Xcode-Projekt erzeugen
        run: xcodegen generate

      - name: Archivieren
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild archive \
            -project HVMeldeApp.xcodeproj \
            -scheme HVMeldeApp \
            -destination 'generic/platform=iOS' \
            -archivePath build/HVMeldeApp.xcarchive \
            CURRENT_PROJECT_VERSION=${{ github.run_number }} \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
            | xcbeautify --renderer github-actions

      - name: iCloud-Entitlements prüfen
        run: |
          set -o pipefail
          APP_PATH="build/HVMeldeApp.xcarchive/Products/Applications/HV Melde App.app"
          codesign -d --entitlements :- "$APP_PATH" > build/archived-entitlements.plist
          plutil -p build/archived-entitlements.plist
          CONTAINER=$(plutil -extract com.apple.developer.icloud-container-identifiers.0 raw build/archived-entitlements.plist)
          if [ "$CONTAINER" != "iCloud.at.zetik.hvmeldeapp" ]; then
            echo "::error::Erwarteter iCloud-Container fehlt im signierten Archiv: $CONTAINER"
            exit 1
          fi

      - name: Exportieren und zu TestFlight hochladen
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          plutil -insert teamID -string "$TEAM_ID" ExportOptions.plist
          if ! xcodebuild -exportArchive \
              -archivePath build/HVMeldeApp.xcarchive \
              -exportOptionsPlist ExportOptions.plist \
              -exportPath build/export \
              -allowProvisioningUpdates \
              -authenticationKeyID "$KEY_ID" \
              -authenticationKeyIssuerID "$ISSUER_ID" \
              -authenticationKeyPath ~/private_keys/AuthKey_${KEY_ID}.p8 \
              2>&1 | tee export.log; then
            grep -iE "error|invalid|fail" export.log | head -30 \
              | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Schlüsseldatei entfernen
        if: always()
        run: rm -rf ~/private_keys
