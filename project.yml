name: HVMeldeApp
options:
  bundleIdPrefix: at.zetik
  developmentLanguage: de
  deploymentTarget:
    iOS: "26.0"
packages:
  HVMeldeCore:
    path: .
targets:
  HVMeldeApp:
    type: application
    platform: iOS
    sources:
      - path: ios-app/App
    dependencies:
      - package: HVMeldeCore
        product: HVMeldeCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: at.zetik.hvmeldeapp
        PRODUCT_NAME: HV Melde App
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: ios-app/App/HVMeldeApp.entitlements
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: HV Melde App
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSCameraUsageDescription: Die Kamera wird verwendet, um Fotos und Videos als Beweismittel zu einem ausdrücklich erfassten Vorfall aufzunehmen.
        INFOPLIST_KEY_NSMicrophoneUsageDescription: Das Mikrofon wird nur während einer ausdrücklich gestarteten Videoaufnahme verwendet, um den Ton eines dokumentierten Vorfalls aufzunehmen.
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: Dein Standort wird nur auf deinen Wunsch erfasst, um den Ort der Meldung im PDF zu dokumentieren.
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
